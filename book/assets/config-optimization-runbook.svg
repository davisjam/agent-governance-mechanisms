<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 780" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="group" aria-labelledby="cor-title cor-desc">
  <title id="cor-title">A config-optimization runbook with a determinize / judgment / determinize split</title>
  <desc id="cor-desc">A lifecycle loop labelled run then measure then assess wraps a three-step spine. Step one, determinize the data space: a mechanical, automatable step that fixes where the metrics live, their schema, and models of normal versus anomalous values. Step two, judgment in reasoning space: the agent reasons over that data to decide which configuration knobs to turn. Step three, determinize again in experiment space: applying the chosen configuration is made mechanical, which lets the step capture and log the reasoning trace, the rationale for why this configuration was chosen. That logged trace feeds two consumers: it becomes an input to the next iteration of the loop, so the optimizer learns from its own recorded reasoning, and it becomes a decision trace a secondary checker reads, which evaluates the choice far better than it could from the raw output alone.</desc>

  <defs>
    <marker id="cor-ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4a7a"/>
    </marker>
  </defs>

  <!-- ===================== LIFECYCLE LOOP (run -> measure -> assess), wrapping the spine ===================== -->
  <text x="210" y="60" text-anchor="middle" font-size="40" font-weight="700" fill="#1a4a7a">run</text>
  <text x="650" y="60" text-anchor="middle" font-size="40" font-weight="700" fill="#1a4a7a">measure</text>
  <text x="1090" y="60" text-anchor="middle" font-size="40" font-weight="700" fill="#1a4a7a">assess</text>

  <!-- run -> measure -->
  <path d="M260,70 C400,98 520,98 588,76" fill="none" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>
  <!-- measure -> assess -->
  <path d="M730,76 C840,98 960,98 1058,70" fill="none" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>

  <!-- assess -> down right -> across bottom -> up left -> back into "run" -->
  <path d="M1128,74 C1240,180 1240,600 1110,690 C860,780 400,780 190,690 C60,600 60,180 172,76"
        fill="none" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>

  <!-- ===================== SPINE: Determinize -> Judgment -> Determinize ===================== -->
  <text x="650" y="176" text-anchor="middle" font-size="32" font-weight="700" fill="#12324a">A determinize &#8594; judgment &#8594; determinize split</text>

  <!-- Step 1: Determinize (data-space) -->
  <rect x="70" y="220" width="336" height="150" rx="6" fill="#eef2f6" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="238" y="270" text-anchor="middle" font-size="40" font-weight="700" fill="#12324a">Determinize</text>
  <text x="238" y="310" text-anchor="middle" font-size="24" fill="#3a4a58">mechanical &#183; automatable</text>
  <text x="238" y="344" text-anchor="middle" font-size="24" font-style="italic" fill="#3a4a58">data-space</text>

  <!-- arrow: determinize -> judgment -->
  <line x1="408" y1="295" x2="452" y2="295" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>

  <!-- Step 2: Judgment (reasoning decides) -->
  <polygon points="650,208 810,295 650,382 490,295" fill="#1a4a7a" stroke="#12324a" stroke-width="1.5"/>
  <text x="650" y="292" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">Judgment</text>
  <text x="650" y="324" text-anchor="middle" font-size="24" fill="#dbe6f0">reasoning decides</text>

  <!-- arrow: judgment -> determinize (right) -->
  <line x1="812" y1="295" x2="892" y2="295" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>

  <!-- Step 3: Determinize again (experiment-space) -->
  <rect x="894" y="220" width="336" height="150" rx="6" fill="#eef2f6" stroke="#1a4a7a" stroke-width="2.5"/>
  <text x="1062" y="270" text-anchor="middle" font-size="40" font-weight="700" fill="#12324a">Determinize</text>
  <text x="1062" y="310" text-anchor="middle" font-size="24" fill="#3a4a58">mechanical &#183; automatable</text>
  <text x="1062" y="344" text-anchor="middle" font-size="24" font-style="italic" fill="#3a4a58">experiment-space</text>

  <!-- ===================== logged reasoning trace, two consumers ===================== -->
  <line x1="1062" y1="370" x2="1062" y2="416" stroke="#1a4a7a" stroke-width="2.2" marker-end="url(#cor-ah)"/>

  <!-- logged reasoning trace box -->
  <rect x="838" y="414" width="424" height="116" rx="6" fill="#ffffff" stroke="#1a4a7a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1050" y="450" text-anchor="middle" font-size="30" font-weight="700" fill="#1a4a7a">Logged reasoning trace</text>
  <text x="1050" y="482" text-anchor="middle" font-size="24" fill="#3a4a58">why this configuration was chosen</text>
  <text x="1050" y="512" text-anchor="middle" font-size="24" font-style="italic" fill="#3a4a58">captured because step 3 is deterministic</text>

  <!-- consumer (a): input to next iteration -->
  <path d="M838,466 C600,494 300,470 208,424" fill="none" stroke="#1a4a7a" stroke-width="2" marker-end="url(#cor-ah)"/>
  <rect x="120" y="416" width="470" height="102" rx="6" fill="#eef2f6" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="355" y="454" text-anchor="middle" font-size="30" font-weight="700" fill="#12324a">(a) Input to the next iteration</text>
  <text x="355" y="490" text-anchor="middle" font-size="24" fill="#3a4a58">the loop learns from its own logged reasoning</text>

  <!-- consumer (b): decision trace for a secondary checker -->
  <line x1="1030" y1="530" x2="1030" y2="576" stroke="#1a4a7a" stroke-width="2" marker-end="url(#cor-ah)"/>
  <rect x="686" y="578" width="600" height="102" rx="6" fill="#eef2f6" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="986" y="614" text-anchor="middle" font-size="28" font-weight="700" fill="#12324a">(b) Decision trace for a secondary checker</text>
  <text x="986" y="650" text-anchor="middle" font-size="24" fill="#3a4a58">the trace evaluates better than the raw output alone</text>

  <!-- ===================== BOTTOM LABEL ===================== -->
  <text x="355" y="612" text-anchor="middle" font-size="30" font-weight="700" fill="#12324a">A lifecycle the runbook is anchored to</text>
</svg>
