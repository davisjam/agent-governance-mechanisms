<?xml version="1.0" encoding="UTF-8"?>
<!-- Hand-authored SVG (not Mermaid): the novelty axis as a single horizontal spectrum with
     two poles and the knobs that slide along it. Mermaid has no spectrum/gradient-axis
     primitive — this is an infographic axis, not a node-edge graph — so it drops to SVG.
     Accent #1a4a7a, source-red #8a2f2f, cream #f4ede0, panel #eef3f8. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400"
     role="group" aria-labelledby="naTitle naDesc"
     font-family="'Helvetica Neue', Arial, sans-serif">
  <title id="naTitle">The novelty axis: how a part's novelty sets the leap you can trust and the oversight you owe</title>
  <desc id="naDesc">A horizontal spectrum runs from standard software on the left to novel software on
    the right. On the standard end — a to-do list, a typical web app, a compiler — the training data
    is full of the class, so the model is biased toward the code you need; you can trust a big leap and
    let the agent produce a lot of code unattended. On the novel end — a new class of software, a
    research setting like high-performance computing, or a part shaped by an obscure commercially-used
    library — the training data is thin, so the model is biased away from the code you need; up-front
    modeling is not optional, and you coach the agent step by step. Three knobs slide together along the
    axis: as novelty rises, the trustable leap shrinks, the oversight you give grows, and the reasoning
    you allow between checks shortens. Model-based software engineering earns its keep on the right,
    where you impose the bias the model's training never gave it.</desc>

  <defs>
    <linearGradient id="naGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#f4ede0"/>
    </linearGradient>
    <marker id="naArrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#33383d"/>
    </marker>
  </defs>

  <!-- the axis bar -->
  <rect x="60" y="70" width="840" height="46" rx="10" fill="url(#naGrad)" stroke="#8a8f95" stroke-width="1.5"/>
  <text x="150" y="99" text-anchor="middle" font-size="22" font-weight="700" fill="#1a4a7a">STANDARD</text>
  <text x="810" y="99" text-anchor="middle" font-size="22" font-weight="700" fill="#8a2f2f">NOVEL</text>

  <!-- pole descriptions -->
  <text x="150" y="146" text-anchor="middle" font-size="17" fill="#33383d">model biased TOWARD your code</text>
  <text x="150" y="168" text-anchor="middle" font-size="15" font-style="italic" fill="#5f5f5f">to-do list · typical web app · compiler</text>
  <text x="810" y="146" text-anchor="middle" font-size="17" fill="#33383d">model biased AWAY from your code</text>
  <text x="810" y="168" text-anchor="middle" font-size="15" font-style="italic" fill="#5f5f5f">new class · HPC · obscure library</text>

  <!-- MBSE-earns-its-keep bracket over the novel half -->
  <path d="M480,58 L480,44 L900,44 L900,58" fill="none" stroke="#8a2f2f" stroke-width="2"/>
  <text x="690" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#8a2f2f">where MBSE earns its keep</text>

  <!-- three sliding knobs: sliders start right of the longest left-label -->
  <g font-size="17" fill="#33383d">
    <text x="60" y="228" font-weight="700" fill="#1a4a7a">trustable leap</text>
    <line x1="330" y1="222" x2="900" y2="222" stroke="#c8ccd0" stroke-width="6" stroke-linecap="round"/>
    <text x="352" y="228" text-anchor="middle" font-size="15" fill="#5f5f5f">big</text>
    <text x="878" y="228" text-anchor="middle" font-size="15" fill="#5f5f5f">small</text>

    <text x="60" y="278" font-weight="700" fill="#1a4a7a">oversight you give</text>
    <line x1="330" y1="272" x2="900" y2="272" stroke="#c8ccd0" stroke-width="6" stroke-linecap="round"/>
    <text x="352" y="278" text-anchor="middle" font-size="15" fill="#5f5f5f">light</text>
    <text x="878" y="278" text-anchor="middle" font-size="15" fill="#5f5f5f">heavy</text>

    <text x="60" y="328" font-weight="700" fill="#1a4a7a">reasoning between checks</text>
    <line x1="330" y1="322" x2="900" y2="322" stroke="#c8ccd0" stroke-width="6" stroke-linecap="round"/>
    <text x="352" y="328" text-anchor="middle" font-size="15" fill="#5f5f5f">long</text>
    <text x="878" y="328" text-anchor="middle" font-size="15" fill="#5f5f5f">short</text>
  </g>

  <!-- the "as novelty rises" arrow tying the knobs to the axis -->
  <line x1="330" y1="360" x2="900" y2="360" stroke="#33383d" stroke-width="2.5" marker-end="url(#naArrow)"/>
  <text x="565" y="384" text-anchor="middle" font-size="16" font-style="italic" fill="#5f5f5f">as novelty rises, all three slide right together</text>
</svg>
