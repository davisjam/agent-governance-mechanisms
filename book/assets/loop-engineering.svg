<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="group" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">Loop engineering</title>
  <desc id="loop-desc">A single cycle. An Input paired with a success metric feeds Agent reasoning, which produces an Output, which feeds back around into the Input. The whole loop is the unit of engineering. The success metric is emphasized in the accent color because defining it is the hard question.</desc>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ah-accent" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4a7a"/>
    </marker>
  </defs>

  <!-- ===== The three boxes: left edge x=70, width=250, center x=195 ===== -->

  <!-- Input + success metric -->
  <rect x="70" y="40" width="250" height="86" rx="4" fill="#f4f4f4" stroke="#333" stroke-width="1.5"/>
  <text x="195" y="78" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Input</text>
  <text x="195" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#1a4a7a">+ success metric</text>

  <!-- Agent reasoning -->
  <rect x="70" y="217" width="250" height="86" rx="4" fill="#f4f4f4" stroke="#333" stroke-width="1.5"/>
  <text x="195" y="266" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Agent reasoning</text>

  <!-- Output -->
  <rect x="70" y="394" width="250" height="86" rx="4" fill="#f4f4f4" stroke="#333" stroke-width="1.5"/>
  <text x="195" y="443" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Output</text>

  <!-- ===== down arrows between boxes (centered x=195) ===== -->
  <line x1="195" y1="126" x2="195" y2="215" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="195" y1="303" x2="195" y2="392" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== feedback arc: Output right edge, bulge right, back up into Input right edge ===== -->
  <path d="M 320 437 C 450 437, 450 83, 322 83" fill="none" stroke="#1a4a7a" stroke-width="2.5" marker-end="url(#ah-accent)"/>
  <text x="450" y="260" text-anchor="middle" font-size="15" fill="#1a4a7a" font-style="italic" transform="rotate(90 450 260)">feeds around</text>
</svg>
