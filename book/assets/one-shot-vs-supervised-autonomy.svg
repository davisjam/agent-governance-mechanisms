<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 660" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="group" aria-labelledby="csp-title csp-desc">
  <title id="csp-title">One-shot scripting versus supervised autonomy</title>
  <desc id="csp-desc">A decision path for a computational coding task. Starting from "What kind of task", you specify the input/output behavior, then split by task size and difficulty. A simple task under a few thousand lines with no reasoning goes to one-shot scripting: describe the process and the agent produces it in a single pass. A hard task, especially one that includes reasoning, goes to supervised autonomy, where you supply four things: correctness conditions and proposed sub-tasks that shape the system, and tools that determinize recurring processes plus monitoring and intervention that shape the development process.</desc>

  <defs>
    <marker id="csp-ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4a5e"/>
    </marker>
  </defs>

  <!-- ===================== TOP ROW ===================== -->
  <!-- Decision diamond: "What kind of task" -->
  <polygon points="128,66 268,120 128,174 -12,120" fill="#e9eef1" stroke="#1a4a5e" stroke-width="1.5"/>
  <text x="128" y="114" text-anchor="middle" font-size="30" font-weight="700" fill="#12333f">What kind</text>
  <text x="128" y="146" text-anchor="middle" font-size="30" font-weight="700" fill="#12333f">of task?</text>

  <!-- arrow: diamond -> specify I/O -->
  <line x1="268" y1="120" x2="305" y2="120" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- Specify I/O behavior -->
  <rect x="308" y="82" width="300" height="76" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="458" y="130" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Specify I/O behavior</text>

  <!-- "Simple task" annotation above the right arrow -->
  <text x="666" y="60" text-anchor="middle" font-size="24" font-style="italic" fill="#3a3a3a">Simple task &#8212; under a few KLOC</text>
  <!-- arrow: specify -> one-shot -->
  <line x1="608" y1="120" x2="700" y2="120" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- One-shot scripting -->
  <rect x="705" y="62" width="245" height="168" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="827" y="112" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">&#8220;One-shot</text>
  <text x="827" y="150" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">scripting&#8221;</text>
  <text x="827" y="188" text-anchor="middle" font-size="24" font-style="italic" fill="#dfe8ec">eg a CSV-to-HTML</text>
  <text x="827" y="214" text-anchor="middle" font-size="24" font-style="italic" fill="#dfe8ec">report script</text>

  <!-- "Hard task" annotation left of the down arrow -->
  <text x="300" y="210" text-anchor="middle" font-size="24" font-style="italic" fill="#3a3a3a">Hard task &#8212; esp. if it includes reasoning</text>

  <!-- arrow: specify -> supervised autonomy (down) -->
  <line x1="443" y1="158" x2="443" y2="256" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- ===================== MIDDLE ROW ===================== -->
  <!-- Supervised autonomy -->
  <rect x="225" y="258" width="470" height="82" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="460" y="311" text-anchor="middle" font-size="40" font-weight="700" font-style="italic" fill="#ffffff">Supervised autonomy</text>

  <!-- ===================== FAN-OUT to four leaves ===================== -->
  <!-- leaf centers: 130, 350, 620, 900 ; leaf tops at y=420 ; hub at (460,340) -->
  <line x1="460" y1="340" x2="130" y2="415" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="340" x2="350" y2="415" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="340" x2="620" y2="415" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="340" x2="900" y2="415" stroke="#1a4a5e" stroke-width="1.5"/>

  <!-- Leaf 1: Correctness conditions -->
  <rect x="16" y="420" width="228" height="116" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="130" y="468" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Correctness</text>
  <text x="130" y="502" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">conditions</text>

  <!-- Leaf 2: Propose sub-tasks -->
  <rect x="264" y="420" width="172" height="116" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="350" y="468" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Propose</text>
  <text x="350" y="502" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">sub-tasks</text>

  <!-- Leaf 3: Tools to determinize recurring processes -->
  <rect x="456" y="420" width="328" height="116" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="620" y="458" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Tools to &#8220;determinize&#8221;</text>
  <text x="620" y="492" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">recurring processes</text>

  <!-- Leaf 4: Monitoring and intervention -->
  <rect x="804" y="420" width="240" height="116" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="924" y="458" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Monitoring and</text>
  <text x="924" y="492" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">intervention</text>

  <!-- ===================== GROUP LABELS ===================== -->
  <!-- divider between the System pair and the Development pair -->
  <line x1="446" y1="420" x2="446" y2="576" stroke="#9aa8ae" stroke-width="1.5"/>

  <text x="225" y="566" text-anchor="middle" font-size="30" font-weight="700" fill="#12333f">System design</text>
  <text x="745" y="566" text-anchor="middle" font-size="30" font-weight="700" fill="#12333f">Development process</text>
</svg>
