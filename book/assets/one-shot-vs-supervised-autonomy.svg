<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="group" aria-labelledby="csp-title csp-desc">
  <title id="csp-title">One-shot scripting versus supervised autonomy</title>
  <desc id="csp-desc">A decision path for a computational coding task. Starting from "What kind of task", you specify the input/output behavior, then split by task size and difficulty. A simple task under a few thousand lines with no reasoning goes to one-shot scripting: describe the process and the agent produces it in a single pass. A hard task, especially one that includes reasoning, goes to supervised autonomy, where you supply four things: correctness conditions and proposed sub-tasks that shape the system, and tools that determinize recurring processes plus monitoring and intervention that shape the development process.</desc>

  <defs>
    <marker id="csp-ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4a5e"/>
    </marker>
  </defs>

  <!-- ===================== TOP ROW ===================== -->
  <!-- Decision diamond: "What kind of task" -->
  <polygon points="128,74 256,120 128,166 0,120" fill="#e9eef1" stroke="#1a4a5e" stroke-width="1.5"/>
  <text x="128" y="114" text-anchor="middle" font-size="22" font-weight="700" fill="#12333f">What kind</text>
  <text x="128" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#12333f">of task?</text>

  <!-- arrow: diamond -> specify I/O -->
  <line x1="256" y1="120" x2="305" y2="120" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- Specify I/O behavior -->
  <rect x="308" y="84" width="244" height="72" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="430" y="128" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Specify I/O behavior</text>

  <!-- "Simple task" annotation above the right arrow -->
  <text x="660" y="66" text-anchor="middle" font-size="20" font-style="italic" fill="#3a3a3a">Simple task &#8212; under a few KLOC</text>
  <!-- arrow: specify -> one-shot -->
  <line x1="552" y1="120" x2="700" y2="120" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- One-shot scripting -->
  <rect x="705" y="66" width="245" height="158" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="827" y="116" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">&#8220;One-shot</text>
  <text x="827" y="144" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">scripting&#8221;</text>
  <text x="827" y="178" text-anchor="middle" font-size="19" font-style="italic" fill="#dfe8ec">eg a CSV-to-HTML</text>
  <text x="827" y="200" text-anchor="middle" font-size="19" font-style="italic" fill="#dfe8ec">report script</text>

  <!-- "Hard task" annotation left of the down arrow -->
  <text x="288" y="200" text-anchor="middle" font-size="20" font-style="italic" fill="#3a3a3a">Hard task &#8212; esp. if it includes reasoning</text>

  <!-- arrow: specify -> supervised autonomy (down) -->
  <line x1="430" y1="156" x2="430" y2="252" stroke="#1a4a5e" stroke-width="2.2" marker-end="url(#csp-ah)"/>

  <!-- ===================== MIDDLE ROW ===================== -->
  <!-- Supervised autonomy -->
  <rect x="235" y="254" width="450" height="76" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="460" y="301" text-anchor="middle" font-size="27" font-weight="700" font-style="italic" fill="#ffffff">Supervised autonomy</text>

  <!-- ===================== FAN-OUT to four leaves ===================== -->
  <!-- leaf centers: 118, 305, 553, 812 ; leaf tops at y=410 ; hub at (460,330) -->
  <line x1="460" y1="330" x2="118" y2="405" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="330" x2="305" y2="405" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="330" x2="553" y2="405" stroke="#1a4a5e" stroke-width="1.5"/>
  <line x1="460" y1="330" x2="812" y2="405" stroke="#1a4a5e" stroke-width="1.5"/>

  <!-- Leaf 1: Correctness conditions -->
  <rect x="16" y="410" width="204" height="92" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="118" y="450" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Correctness</text>
  <text x="118" y="476" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">conditions</text>

  <!-- Leaf 2: Propose sub-tasks -->
  <rect x="226" y="410" width="158" height="92" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="305" y="450" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Propose</text>
  <text x="305" y="476" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">sub-tasks</text>

  <!-- Leaf 3: Tools to determinize recurring processes -->
  <rect x="436" y="410" width="234" height="92" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="553" y="442" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Tools to &#8220;determinize&#8221;</text>
  <text x="553" y="466" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">recurring</text>
  <text x="553" y="490" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">processes</text>

  <!-- Leaf 4: Monitoring and intervention -->
  <rect x="710" y="410" width="204" height="92" rx="6" fill="#1a4a5e" stroke="#12333f" stroke-width="1.5"/>
  <text x="812" y="442" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">Monitoring</text>
  <text x="812" y="466" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">and</text>
  <text x="812" y="490" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">intervention</text>

  <!-- ===================== GROUP LABELS ===================== -->
  <!-- divider between the System pair and the Development pair -->
  <line x1="410" y1="410" x2="410" y2="536" stroke="#9aa8ae" stroke-width="1.5"/>

  <text x="200" y="528" text-anchor="middle" font-size="21" font-weight="700" fill="#12333f">System design</text>
  <text x="662" y="528" text-anchor="middle" font-size="21" font-weight="700" fill="#12333f">Development process</text>
</svg>
